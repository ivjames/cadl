<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#111827" />
    <title>CADL Driver Training</title>
  </head>
  <body>
    <canvas id="renderCanvas" aria-label="CADL 3D driving simulator"></canvas>

    <div id="hud">
      <div class="hud-row">
        <strong>CADL</strong>
        <span id="gear" class="hud-gear">P</span>
        <span id="speed">0 mph</span>
      </div>
      <div class="hud-row hud-sub">
        <span class="limit">
          <span id="speedLimit" class="limit-num">25</span>
          <span class="limit-unit">mph limit</span>
        </span>
        <span id="zoneLabel" class="zone-label"></span>
        <span id="signalIndicator" class="signal-ind" aria-live="off">
          <span id="indLeft" class="ind">◀</span>
          <span id="indRight" class="ind">▶</span>
        </span>
      </div>
      <div id="stopCue" class="stop-cue" hidden>◈ STOP AHEAD</div>
    </div>

    <div id="coach" class="coach">
      <div class="coach-top">
        <span id="lessonTitle" class="lesson-title">Free Drive</span>
        <span class="coach-label">SCORE</span>
        <span id="coachScore" class="coach-score">100</span>
      </div>
      <div id="lessonInstruction" class="lesson-instruction"></div>
      <div id="lessonObjectives" class="lesson-objectives"></div>
      <div id="coachFlash" class="coach-flash" aria-live="polite"></div>
      <div id="lessonStatus" class="lesson-status" hidden></div>
    </div>

    <div id="topControls" class="control-cluster">
      <button id="lessonButton" type="button">Lesson ▸</button>
      <button id="cameraButton" type="button">Camera</button>
      <button id="resetButton" type="button">Reset</button>
    </div>

    <div id="signalControls" class="control-cluster" aria-label="Turn signals">
      <button id="signalLeft" class="signal-button" type="button" aria-label="Signal left">⬅</button>
      <button id="signalRight" class="signal-button" type="button" aria-label="Signal right">➡</button>
    </div>

    <div id="steeringControls" class="control-cluster" aria-label="Steering">
      <div id="steerWheel" class="steer-wheel" role="slider" aria-label="Steering wheel" tabindex="0">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="46" class="wheel-rim" />
          <circle cx="50" cy="50" r="15" class="wheel-hub" />
          <line x1="50" y1="50" x2="8" y2="50" class="wheel-spoke" />
          <line x1="50" y1="50" x2="92" y2="50" class="wheel-spoke" />
          <line x1="50" y1="50" x2="50" y2="92" class="wheel-spoke" />
        </svg>
      </div>
    </div>

    <div id="pedalControls" class="control-cluster driving-controls" aria-label="Pedal controls">
      <button id="brakeButton" class="drive-button pedal brake" type="button">BRAKE</button>
      <button id="gasButton" class="drive-button pedal gas" type="button">GAS</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
